<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street Objects</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --border: #d9d9d6;
  --text: #111111;
  --text-muted: #6a6a6a;
}

html, body {
  height: 100%;
  font-family: Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

#app { display: flex; height: 100vh; }

#sidebar {
  width: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  transition: width 0.25s;
}

#sidebar.open { width: 360px; }

.sidebar-content { padding: 24px; }

.sidebar-image {
  width: 100%;
  min-height: 320px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
}

.sidebar-image img {
  width: 100%;
  max-height: 360px;
  object-fit: contain;
}

.sidebar-title {
  font-size: 20px;
  margin-bottom: 14px;
}

.sidebar-detail {
  font-size: 12px;
  margin-bottom: 10px;
  color: var(--text-muted);
}

#main { flex: 1; display:flex; flex-direction:column; }

#header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

#filters {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
}

#timeline-bar {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}

#map { flex:1; }

.pill {
  padding:4px 10px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
  font-size:11px;
}

.pill.active {
  background:black;
  color:white;
}

.map-marker {
  width:64px; height:64px;
}

.map-marker img {
  width:100%; height:100%; object-fit:contain;
}
</style>
</head>

<body>
<div id="app">

<div id="sidebar">
  <div class="sidebar-content" id="sidebar-body"></div>
</div>

<div id="main">
  <div id="header">
    <h2>Street Objects</h2>
  </div>

  <div id="filters">
    <div id="cat-pills"></div>
    <div id="mat-pills"></div>
  </div>

  <div id="timeline-bar">
    <input type="range" id="timeline">
    <span id="date-display"></span>
  </div>

  <div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
function d(str){
  const [day,mon,yr]=str.split('/').map(Number);
  return new Date(yr,mon-1,day);
}

function jitter(v,a=0.00005){
  return v+(Math.random()-0.5)*a;
}

const objects = [/* KEEP YOUR SAME DATA HERE (unchanged) */];

const allDates = objects.flatMap(o=>[o.found,o.missing]);
const minDate=new Date(Math.min(...allDates));
const maxDate=new Date(Math.max(...allDates));
const totalDays=Math.round((maxDate-minDate)/86400000);

const slider=document.getElementById('timeline');
slider.min=0; slider.max=totalDays; slider.step=0.25;

function sliderDate(){
  return new Date(minDate.getTime()+slider.value*86400000);
}

function formatDate(dt){
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

const map=L.map('map').setView([51.4651,-0.0470],16);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

function createMarkerIcon(obj){
  return L.divIcon({
    html:`<div class="map-marker"><img src="${obj.image}"/></div>`,
    className:'', iconSize:[64,64]
  });
}

function openSidebar(obj){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-body').innerHTML=`
    <div class="sidebar-image"><img src="${obj.image}"></div>
    <div class="sidebar-title">${obj.name}</div>
    <div class="sidebar-detail">${formatDate(obj.found)} → ${formatDate(obj.missing)}</div>
    <div class="sidebar-detail">${obj.material}</div>
  `;
}

const markerData=objects.map(obj=>{
  const marker=L.marker([jitter(obj.lat),jitter(obj.lng)],{icon:createMarkerIcon(obj)});
  marker.on('click',()=>openSidebar(obj));
  marker.addTo(map);
  return {marker,obj,trail:[]};
});

const FADE_DAYS=1.5;

function render(){
  const current=sliderDate();
  document.getElementById('date-display').textContent=formatDate(current);

  markerData.forEach(d=>{
    const {marker,obj,trail}=d;

    const startIn=new Date(obj.found.getTime()-FADE_DAYS*86400000);
    const endIn=obj.found;
    const startOut=obj.missing;
    const endOut=new Date(obj.missing.getTime()+FADE_DAYS*86400000);

    let opacity=0;

    if(current>=startIn && current<endIn){
      opacity=(current-startIn)/(endIn-startIn);
    } else if(current>=endIn && current<startOut){
      opacity=1;
    } else if(current>=startOut && current<=endOut){
      opacity=1-(current-startOut)/(endOut-startOut);
    }

    marker.setOpacity(opacity);

    const el=marker.getElement();
    if(el){
      el.style.pointerEvents=opacity>0.05?'auto':'none';
    }

    // 🌫️ TRAIL SYSTEM
    if(opacity>0.95){
      const ghost=L.circleMarker(marker.getLatLng(),{
        radius:8,
        opacity:0,
        fillOpacity:0.15
      }).addTo(map);

      trail.push({ghost,time:current});

      if(trail.length>5){
        const old=trail.shift();
        map.removeLayer(old.ghost);
      }
    }

    trail.forEach((t,i)=>{
      const age=i/trail.length;
      t.ghost.setStyle({fillOpacity:0.15*(1-age)});
    });
  });
}

slider.addEventListener('input',render);
render();
</script>
</body>
</html>
