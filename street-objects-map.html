    --text: #363636;
    --text-muted: #6E6B6B;
    --accent: #919191;
    --accent-light: #B0ABAB;
    --pill-active-bg: #363636;
    --pill-active-text: #f5f2ec;
    --pill-bg: #EDEBEB;
    --pill-border: #c4bfb4;
  }

  #app { display: flex; flex-direction: row; height: 100vh; }
  #sidebar {
    width: 0;
    background: var(--bg);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    transition: width 0.4s ease;
    flex-shrink: 5;
    z-index: 100;
`}

  left: 12px;
  background: none;

  z-index: 101;


.sidebar-collapse:hover { color: var(--text); }

  }

    font-weight: 700;

    color: var(--text);

  }

  }

  }

    flex-direction: column;

    color: var(--text-muted);
    text-transform: uppercase;
    width: 64px;
    flex-shrink: 0;

  .pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--pill-border);
    background: var(--pill-bg);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s ease;
    text-transform: lowercase;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--text-muted); color: var(--text); }
  .pill.active { background: var(--pill-active-bg); color: var(--pill-active-text); border-color: var(--pill-active-bg); }
  #timeline-bar {
    padding: 10px 20px 12px;

    display: flex;
    align-items: center;
    gap: 14px;
  }

    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    flex-shrink: 0;
  }

    border-radius: 20px;

    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  #play-btn:hover { background: var(--surface); }
  #play-btn.playing { background: var(--text); color: var(--bg); border-color: var(--text); }
  #count-display {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-left: auto;
    flex-shrink: 0;
  }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 2px;
    background: var(--border);
    outline: none;
    border-radius: 2px;
    position: relative;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--text);
    transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
    border: 2px solid var(--bg);
  }
  #map { flex: 1; z-index: 0; }
  .leaflet-control-zoom a {
    font-family: 'DM Mono', monospace !important;
    color: var(--text) !important;
    background: var(--bg) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-attribution {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    background: rgba(245,242,236,0.85) !important;
  }
  .map-marker {
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 64px;
    height: 64px;
    border-radius: 12px;
    transition: all 0.15s;
  }
  .map-marker:hover {
    transform: scale(1.5);
  }
  .map-marker img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 12px;
  }

</div>

  { name:'blue boxes',          category:'homeware',     lat:51.46486, lng:-0.04443, found:d('02/03/2026'), missing:d('05/03/2026'), material:'fabric', image:'https://raw.githubusercontent.com/beeficon/PIP-50-objects/main/boxes-02032026.png' },
  { name:'mirror',              category:'homeware',     lat:51.46596, lng:-0.04959, found:d('28/01/2026'), missing:d('04/02/2026'), material:'wood, glass, aluminium', image:'https://raw.githubusercontent.com/beeficon/PIP-50-objects/main/mirror-28012026.png' },
  { name:'suitcase',            category:'luggage',      lat:51.46521, lng:-0.04631, found:d('04/02/2026'), missing:d('25/02/2026'), material:'fabric, plastic', image:'https://raw.githubusercontent.com/beeficon/PIP-50-objects/main/suitcase-04022026.png' },
];

const ICON_EMOJI = {
  construction: '🚧', furniture: '🛋️', homeware: '🏠',
  rubbish: '🗑️', panel: '🪟', vehicle: '🚗',
  luggage: '🧳', misc: '📦', clothing: '👕',
};

const allDates = objects.flatMap(o => [o.found, o.missing]);
const minDate = new Date(Math.min(...allDates));
const maxDate = new Date(Math.max(...allDates));
const totalDays = Math.round((maxDate - minDate) / 86400000);

const slider = document.getElementById('timeline');
slider.min = 0;
slider.max = totalDays;
slider.value = 0;

function sliderDate() {
  const ms = minDate.getTime() + (+slider.value) * 86400000;
  return new Date(ms);
}

function formatDate(dt) {
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

const map = L.map('map', { zoomControl: true }).setView([51.4651, -0.0470], 16);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

function createMarkerIcon(obj) {
  return L.divIcon({
    html: `<div class="map-marker" data-name="${obj.name}"><img src="${obj.image}" alt="${obj.name}" onerror="this.parentElement.innerHTML='${ICON_EMOJI[obj.category] || '📍'}'" /></div>`,
    className: '',
    iconSize: [64, 64],
    iconAnchor: [32, 32],
    popupAnchor: [0, -32]
  });
}

function openSidebar(obj) {
  const sidebar = document.getElementById('sidebar');
  const sidebarBody = document.getElementById('sidebar-body');
  
  sidebarBody.innerHTML = `
    <div class="sidebar-image">
      <img src="${obj.image}" alt="${obj.name}" onerror="this.style.display='none';this.parentElement.textContent='${ICON_EMOJI[obj.category] || '📍'}'"/>
    </div>
    <div class="sidebar-title">${obj.name}</div>
    <div class="sidebar-detail">
      <div class="sidebar-detail-label">Found</div>
      <div class="sidebar-detail-value">${formatDate(obj.found)}</div>
    </div>
    <div class="sidebar-detail">
      <div class="sidebar-detail-label">Disappeared</div>
      <div class="sidebar-detail-value">${formatDate(obj.missing)}</div>
    </div>
    <div class="sidebar-detail">
      <div class="sidebar-detail-label">Duration</div>
      <div class="sidebar-detail-value">${Math.ceil((obj.missing - obj.found) / 86400000)} days</div>
    </div>
    <div>
      <span class="sidebar-tag">${obj.category}</span>
      <span class="sidebar-tag">${obj.material}</span>
    </div>
  `;
  
  sidebar.classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

const markerData = objects.map(obj => {
  const icon = createMarkerIcon(obj);
  const marker = L.marker([obj.lat, obj.lng], { icon });
  marker.on('click', () => openSidebar(obj));
  return { marker, obj };
});

let activeCat = 'all';
let activeMat = 'all';

const allMaterials = [...new Set(
  objects.flatMap(o => o.material.split(',').map(m => m.trim().toLowerCase()))
)].sort();

const categories = ['all', ...new Set(objects.map(o => o.category))];
const materials  = ['all', ...allMaterials];

function buildPills(containerId, items, getCurrent, onClick) {
  const wrap = document.getElementById(containerId);
  wrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;';
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (item === getCurrent() ? ' active' : '');
    btn.textContent = item;
    btn.onclick = () => {
      onClick(item);
      wrap.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    wrap.appendChild(btn);
  });
}

buildPills('cat-pills', categories, () => activeCat, v => { activeCat = v; });
buildPills('mat-pills', materials,  () => activeMat, v => { activeMat = v; });

function render() {
  const current = sliderDate();
  document.getElementById('date-display').textContent = formatDate(current);

  let visible = 0;
  markerData.forEach(({ marker, obj }) => {
    const inTime = obj.found <= current && obj.missing > current;
    const inCat  = activeCat === 'all' || obj.category === activeCat;
    const inMat  = activeMat === 'all' || obj.material.toLowerCase().includes(activeMat);

    if (inTime && inCat && inMat) {
      if (!map.hasLayer(marker)) marker.addTo(map);
      visible++;
    } else {
      if (map.hasLayer(marker)) marker.remove();
    }
  });

  document.getElementById('count-display').textContent =
    `${visible} object${visible !== 1 ? 's' : ''} visible`;
  document.getElementById('header-sub').textContent =
    `${objects.length} objects · ${formatDate(minDate)} – ${formatDate(maxDate)}`;
}

slider.addEventListener('input', render);

let playInterval = null;
const playBtn = document.getElementById('play-btn');

playBtn.addEventListener('click', () => {
  if (playInterval) {
    clearInterval(playInterval);
    playInterval = null;
    playBtn.textContent = '▶ play';
    playBtn.classList.remove('playing');
  } else {
    if (+slider.value >= totalDays) slider.value = 0;
    playBtn.textContent = '■ stop';
    playBtn.classList.add('playing');
    playInterval = setInterval(() => {
      if (+slider.value >= totalDays) {
        clearInterval(playInterval);
        playInterval = null;
        playBtn.textContent = '▶ play';
        playBtn.classList.remove('playing');
        return;
      }
      slider.value = +slider.value + 1;
      render();
    }, 120);
  }
});

render();
</script>
</body>
</html>
