<title>Street Objects</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700;900&family=Source+Code+Pro&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --muted: #888;
  }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  cursor: url('https://raw.githubusercontent.com/beeficon/PIP-50-objects/main/cursor%2064x64.png') 32 32, auto;
}
  }

  #title-screen {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    user-select: none;
  }

  #title-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
    line-height: 0.88;
  }

  .title-word {
    display: flex;
    flex-direction: row;
  }

  .letter-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: default;
  }

  .letter-wrap.space {
    width: 0.28em;
  }

  .letter-text,
  .letter-img {
    display: block;
    font-size: clamp(300px, 10vw, 100px);
    font-weight: 1000;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;

  }

  .letter-img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 0.75em;
    height: 0.75em;
    object-fit: contain;
    opacity: 0;
    pointer-events: none;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.10));
  }

  .letter-wrap:not(.space):hover .letter-text {
    opacity: 0;
  }

  .letter-wrap:not(.space):hover .letter-img {
    opacity: 1;
  }


  @keyframes bob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    40% { transform: translateX(-40%) translateY(6px); }
  }
</style>
</head>
<body>

<div id="title-screen">
  <div id="title-wrap">
    <div class="title-word" id="word-street"></div>
    <div class="title-word" id="word-objects"></div>
  </div>

<script>
buildWord('word-street', 'STREET');
buildWord('word-objects', 'OBJECTS');

document.getElementById('word-street').style.cursor = 'pointer';
document.getElementById('word-objects').style.cursor = 'pointer';

document.getElementById('word-street').addEventListener('click', () => {
  window.location.href = 'main.html';
});
document.getElementById('word-objects').addEventListener('click', () => {
  window.location.href = 'main.html';

</script>

// shuffle all images and cycle through per individual letter
function makePicker() {
  let queue = [...IMAGES].sort(() => Math.random() - 0.5);
  let i = 0;
  return function next() {
    const img = queue[i % queue.length];
    i++;
    // after all images looked at, reshuffle
    if (i % queue.length === 0) {
      queue = [...IMAGES].sort(() => Math.random() - 0.5);
    }
    return img;
  };
}

function buildWord(containerId, text) {
  const container = document.getElementById(containerId);
  for (const char of text) {
    const wrap = document.createElement('div');
    wrap.className = 'letter-wrap' + (char === ' ' ? ' space' : '');

    if (char !== ' ') {
      const span = document.createElement('span');
      span.className = 'letter-text';
      span.textContent = char;

      const img = document.createElement('img');
      img.className = 'letter-img';
      img.alt = char;

      const pick = makePicker();

      // first image set
      img.src = pick();

      // cycle through image bank after each
      wrap.addEventListener('mouseenter', () => {
        img.src = pick();
      });

      wrap.appendChild(span);
      wrap.appendChild(img);
    }

    container.appendChild(wrap);
  }
}

buildWord('word-street', 'STREET');
buildWord('word-objects', 'OBJECTS');
