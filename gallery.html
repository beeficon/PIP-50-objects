  <link href="https://fonts.googleapis.com/css2?family=DM+Mono&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #363636;
      --text-muted: #6E6B6B;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      cursor: none;
    }

    #default-cursor {
      position: fixed;
      top: 0; left: 0;
      width: 64px; height: 64px;
      background-image: url('https://raw.githubusercontent.com/beeficon/PIP-50-objects/main/cursor%2064x64.png');
      background-size: contain;
      background-repeat: no-repeat;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-32px, -32px);
      will-change: transform;
    }

    #default-cursor.alt {
      background-image: url('https://raw.githubusercontent.com/beeficon/PIP-50-objects/main/cursor%202%2064x64.png');
    }

    .page-title, #map-section, #about-section {
      cursor: pointer;
    }

    .page-title {
      font-size: 75px;
      font-weight: 700;
      text-transform: uppercase;
      margin: 20px;
    }

    .gallery-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 5px;
      margin: 30px;
    }

    .gallery-item {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      cursor: none;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      cursor: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      padding: 12px;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .overlay .title {
      flex: 1;
      min-width: 0;
      text-align: left;
      font-family: 'DM Mono', monospace;
      font-size: clamp(60px, 1.6vw, 50px);
      line-height: 0.7;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .overlay .desc {
      flex: 1;
      min-width: 0;
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: clamp(25px, 1.4vw, 25px);
      line-height: 1.3;
      color: var(--text-muted);
      overflow-wrap: anywhere;
    }

    #top-right-section {
      position: absolute;
      top: 20px;
      right: -100px;
      width: 250px;
      padding: 10px;
      border-radius: 8px;
      z-index: 200;
    }

    #top-right-section h2 {
      margin-bottom: -10px;
      font-size: 1.5em;
    }
  </style>
</head>

<body>

document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// Hide/show when leaving/entering window
document.addEventListener('mouseleave', () => { cursor.style.display = 'none'; });
document.addEventListener('mouseenter', () => { cursor.style.display = 'block'; });

// Alt cursor on click
document.addEventListener('mousedown', () => cursor.classList.add('alt'));
document.addEventListener('mouseup',   () => cursor.classList.remove('alt'));

// Hide custom cursor over nav elements so native pointer cursor shows
document.querySelectorAll('.page-title, #map-section, #about-section').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.style.display = 'none');
  el.addEventListener('mouseleave', () => cursor.style.display = 'block');
});

const gallery = document.getElementById('gallery');

objects.forEach(obj => {
  const item = document.createElement('div');
  item.className = 'gallery-item';

  const img = document.createElement('img');
  const positive = obj.image.replace('-negative', '');

  img.src = obj.image;
  img.dataset.src = obj.image;
  img.dataset.hoverSrc = positive;
  img.loading = 'lazy';

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="title">${obj.name}</div>
    <div class="desc">
      ${obj.category}<br>
      ${obj.material}<br>
      ${obj.lat}<br>
      ${obj.lng}<br>
      ${obj.found}<br>
      ${obj.missing}
    </div>
  `;

  item.addEventListener('mouseenter', () => {
    img.src = img.dataset.hoverSrc;
    cursor.classList.add('alt');
  });

  item.addEventListener('mouseleave', () => {
    img.src = img.dataset.src;
    cursor.classList.remove('alt');
  });

  item.addEventListener('click', () => {
    const hidden = img.style.opacity === '0';
    img.style.opacity = hidden ? '1' : '0';
    overlay.style.opacity = hidden ? '0' : '1';
  });

  item.appendChild(img);
  item.appendChild(overlay);
  gallery.appendChild(item);
});

document.getElementById('map-section').addEventListener('click', () => {
  window.location.href = 'main.html';
});

document.getElementById('about-section').addEventListener('click', () => {
  window.location.href = 'about.html';
});
